server {
    listen 80;
    server_name webapp.local;
    root /home/prasiddha/assignment/week2/webapp;
    index index.html;


    location / {
       try_files $uri $uri/ =404;
    }

    location /about {
    	try_files /about.html =404;
    }


    # custom 404 page
    error_page 404 /404.html;

	# prevent direct access by user
	location /404.html {
		internal;
	}
    

    access_log /var/log/nginx/webapp_access.log;
    error_log  /var/log/nginx/webapp_error.log;
}   
