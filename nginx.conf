# for nginx as proxy

server {
    listen 80;
    server_name webapp.local;

    access_log /var/log/nginx/webapp_access.log;
    error_log  /var/log/nginx/webapp_error.log;

    # Reverse proxy to Apache
    location / {
    	# its better to use 127.0.0.1 when webserver and proxy hosted on same server
    	# it doesn't involve DNS resolution
        proxy_pass http://127.0.0.1:8080;
        
        # Preserve original request info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Let Apache handle 404s 
}
