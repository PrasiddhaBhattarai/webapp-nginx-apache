<VirtualHost *:8080>
    ServerName webapp.local

    DocumentRoot "/home/prasiddha/assignment/week2/webapp"

    DirectoryIndex index.html

    <Directory "/home/prasiddha/assignment/week2/webapp">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

	# to serve about.html
    Alias /about /home/prasiddha/assignment/week2/webapp/about.html

	# Custom 404 page
    ErrorDocument 404 /404.html
    
    # Prevent direct access to 404.html (similar to "internal" in nginx)
    <Files "404.html">
       Require all denied
    </Files>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/apachesite_error.log
    CustomLog ${APACHE_LOG_DIR}/apachesite_access.log combined

</VirtualHost>
